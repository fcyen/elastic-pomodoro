<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@300&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.1/css/all.min.css" integrity="sha512-xA6Hp6oezhjd6LiLZynuukm80f8BoZ3OpcEYaqKoCV3HKQDrYjDE1Gu8ocxgxoXmwmSzM4iqPvCsOkQNiu41GA==" crossorigin="anonymous" />
  </head>
  <body>
    <div id=menu>
      <button class=menu>Completed</button>
      <button class=menu>Stats</button>
      <button class=menu>Settings</button>  
    </div>
    <div id=root></div>
    <div id=tasklist>
      <input type=text class=addtask value="Add task"></input>
      <p class=futuretask>Task 1</p>
      <p class=futuretask>Task 2</p>
      <p class=futuretask>Task 4</p>
      <p class=futuretask>Task 5</p>
      <p class=futuretask>Task 6</p>
      <p class=futuretask>Task 7</p>
      <p class=futuretask>Task 8</p>
      <p class=futuretask>Task 9</p>
    </div>
  </body>
</html>
